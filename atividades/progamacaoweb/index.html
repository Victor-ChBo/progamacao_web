<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Adivinhe o Número</h1>
        <p>Tente acertar o número secreto entre 1 e 20</p>
        
        <input type="number" id="palpite" min="1" max="20" placeholder="Digite aqui...">
        <button id="btnVerificar">Dar Palpite</button>
        
        <div id="mensagem"></div>
        <button id="btnReiniciar" style="display: none;">Jogar Novamente</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
